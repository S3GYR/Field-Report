<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Field Report{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <svg class="icon-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Field Report</span>
        </div>
        <nav class="main-nav">
            <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">Tableau de bord</a>
            <a href="/reports" class="{% if active == 'reports' %}active{% endif %}">Rapports</a>
            <a href="/photos" class="{% if active == 'photos' %}active{% endif %}">Photos</a>
            <a href="/tasks" class="{% if active == 'tasks' %}active{% endif %}">T&acirc;ches</a>
            <a href="/signatures" class="{% if active == 'signatures' %}active{% endif %}">Signatures</a>
        </nav>
    </header>

    <main class="app-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <span>Field Report Manager &mdash; Jinja2 UI</span>
    </footer>

    <div id="toast-container"></div>

    <script src="/static/js/app.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
