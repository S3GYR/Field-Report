{% extends "layout.html" %}
{% set active = "signatures" %}
{% block title %}Signatures — Field Report{% endblock %}

{% block content %}
<div class="card-header" style="margin-bottom: 20px;">
    <h1 class="card-title">Signatures</h1>
    <span style="color: var(--muted); font-size: 0.9rem;">Signatures des rapports</span>
</div>

<div class="card">
    <div class="form-group" style="margin-bottom: 12px;">
        <input class="form-input" id="signature-search" type="search" placeholder="Rechercher une signature…" oninput="filterSignatures()">
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Nom</th>
                <th>R&ocirc;le</th>
                <th>Date</th>
                <th>Rapport</th>
                <th style="width: 120px;">Actions</th>
            </tr>
        </thead>
        <tbody id="signatures-table">
            <tr><td colspan="5" class="empty-state">Chargement…</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal: Edit signature -->
<div class="modal-overlay" id="modal-signature-edit">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Modifier la signature</span>
            <button class="modal-close" onclick="closeModal('modal-signature-edit')">&times;</button>
        </div>
        <form id="form-signature-edit">
            <input type="hidden" name="report_id" id="edit-sig-report-id">
            <div class="form-group">
                <label class="form-label">Nom</label>
                <input class="form-input" name="name" required>
            </div>
            <div class="form-group">
                <label class="form-label">R&ocirc;le</label>
                <input class="form-input" name="role">
            </div>
            <div class="form-group">
                <label class="form-label">Date de signature</label>
                <input class="form-input" type="date" name="signed_on">
            </div>
            <div style="display:flex; gap: 8px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-signature-edit')">Annuler</button>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let _signatures = [];
let _reports = [];

async function loadSignatures() {
    const tbody = document.getElementById("signatures-table");
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Chargement…</td></tr>';
    try {
        [_signatures, _reports] = await Promise.all([
            apiGet(API.signatures + "/"),
            apiGet(API.reports + "/"),
        ]);
        tbody.innerHTML = "";
        if (_signatures.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Aucune signature</td></tr>';
            return;
        }
        _signatures.forEach(s => {
            const report = _reports.find(r => r.id === s.report_id);
            tbody.appendChild(el("tr", {}, [
                el("td", { text: s.name }),
                el("td", { text: s.role || "—" }),
                el("td", { text: formatDate(s.signed_on) }),
                el("td", {}, [el("a", { href: "/reports/" + s.report_id, text: report ? report.number : "—", style: "color:var(--primary);text-decoration:none;" })]),
                el("td", {}, [
                    el("button", { class: "btn btn-sm btn-secondary", text: "Modifier", onclick: `editSignature(${s.report_id})` }),
                    " ",
                    el("button", { class: "btn btn-sm btn-danger", text: "Supprimer", onclick: `deleteSignature(${s.report_id})` }),
                ]),
            ]));
        });
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Erreur: ${err.message}</td></tr>`;
    }
}

function editSignature(reportId) {
    const s = _signatures.find(x => x.report_id === reportId);
    if (!s) return;
    const f = document.getElementById("form-signature-edit");
    f.name.value = s.name;
    f.role.value = s.role || "";
    f.signed_on.value = s.signed_on || "";
    document.getElementById("edit-sig-report-id").value = s.report_id;
    openModal("modal-signature-edit");
}

function deleteSignature(reportId) {
    const s = _signatures.find(x => x.report_id === reportId);
    confirmDelete(`la signature de ${s.name}`, API.signatures + "/" + reportId, loadSignatures);
}

function filterSignatures() {
    const q = document.getElementById("signature-search").value.toLowerCase();
    const rows = document.querySelectorAll("#signatures-table tr");
    rows.forEach(row => {
        if (row.querySelector("td.empty-state")) return;
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(q) ? "" : "none";
    });
}

document.getElementById("form-signature-edit").addEventListener("submit", async e => {
    e.preventDefault();
    const f = e.target;
    const payload = Object.fromEntries(new FormData(f));
    delete payload.report_id;
    try {
        await apiPut(API.signatures + "/" + document.getElementById("edit-sig-report-id").value, payload);
        closeModal("modal-signature-edit");
        f.reset();
        toast("Signature mise &agrave; jour", "info");
        loadSignatures();
    } catch (err) { toast(err.message, "error"); }
});

loadSignatures();
</script>
{% endblock %}
